# ============================================
# SonarQube - Backend (FastAPI)
# ============================================

sonar.projectKey=tutum-backend
sonar.projectName=tutum-backend
sonar.qualitygate.wait=true
sonar.projectVersion=0.1.0

sonar.sources=app
sonar.exclusions=**/__pycache__/**,**/tests/**,.venv/**,workers/**

sonar.python.coverage.reportPaths=coverage.xml

# TODO: 실제 SonarQube 서버 주소로 변경
sonar.host.url=${SONAR_HOST_URL}
sonar.token=${SONAR_TOKEN}
