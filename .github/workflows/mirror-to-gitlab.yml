name: Mirror to GitLab (k8s-manifest/test)

on:
  push:
    branches: ["**"]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push repository to GitLab test branch
        run: |
          git push --force https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/tutum-project/k8s-manifest.git HEAD:test
