# ============================================
# SonarQube - Frontend (Next.js)
# ============================================

sonar.projectKey=tutum-frontend
sonar.projectName=tutum-frontend
sonar.qualitygate.wait=true
sonar.projectVersion=0.1.0

sonar.sources=app,components,hooks,lib,contexts,context
sonar.exclusions=node_modules/**,**/*.test.*,**/*.spec.*,.next/**,public/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# TODO: 실제 SonarQube 서버 주소로 변경
sonar.host.url=${SONAR_HOST_URL}
sonar.token=${SONAR_TOKEN}
