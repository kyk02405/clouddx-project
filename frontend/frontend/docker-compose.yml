# ============================================
# AI 기반 자산관리 플랫폼 - Docker Compose (개발용)
# ============================================
#
# 운영 환경 3VM 토폴로지:
#   VM1/Node1: Entry & Stateless (Nginx, Frontend, FastAPI Gateway, Auth, General)
#   VM2/Node2: Core Infra & Data Master (MongoDB Primary, Redis Master, MinIO, Harbor)
#   VM3/Node3: Worker & Read (Producers, Consumers, Ollama)
#
# 이 파일은 개발 환경에서 단일 머신으로 전체 스택을 실행합니다.
# 운영 배포 시 각 VM별로 분리된 compose 파일로 전환됩니다.
# ============================================

version: '3.8'

services:
  # ============================================
  # Node1 서비스 (Entry & Stateless)
  # ============================================

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - frontend-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    networks:
      - frontend-network

  # FastAPI Backend (Gateway + Auth + General 통합 - 개발용)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - mongodb
      - redis
      - kafka
    networks:
      - frontend-network
      - backend-network
    volumes:
      - ./backend:/app

  # ============================================
  # Node2 서비스 (Core Infra & Data Master)
  # ============================================

  # MongoDB Primary
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=clouddx
    networks:
      - backend-network

  # Redis Master
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - backend-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    networks:
      - backend-network

  # ============================================
  # Node3 서비스 (Worker & Read)
  # ============================================

  # Kafka Broker (KRaft mode)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - backend-network

  # ============================================
  # Workers (Producers & Consumers)
  # ============================================

  # Price Producer
  price-producer:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: price-producer
    command: python price_producer.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - backend-network

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  minio_data:
