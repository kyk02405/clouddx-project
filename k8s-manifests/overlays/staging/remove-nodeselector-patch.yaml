# Staging workloads that need egress or stable image pulls must stay on
# private-only EKS Auto Mode nodes. The default nodeclass can land on
# public-route subnets without NAT and cause intermittent failures.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: tutum-app
spec:
  template:
    spec:
      nodeSelector:
        $patch: replace
        eks.amazonaws.com/nodeclass: private-only
---
