apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: private-app
spec:
  disruption:
    budgets:
      - nodes: 10%
    consolidateAfter: 5m
    consolidationPolicy: WhenEmptyOrUnderutilized
  limits:
    cpu: 32
    memory: 64Gi
  template:
    metadata: {}
    spec:
      expireAfter: 336h
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: private-only
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - spot
            - on-demand
        - key: eks.amazonaws.com/instance-category
          operator: In
          values:
            - m
        - key: eks.amazonaws.com/instance-generation
          operator: Gt
          values:
            - "6"
        - key: eks.amazonaws.com/instance-size
          operator: In
          values:
            - large
            - xlarge
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
        - key: kubernetes.io/os
          operator: In
          values:
            - linux
---
