# Kyverno: Cosign 서명된 이미지만 배포 허용 정책
# 전제: Cosign 키 쌍 생성 완료 (cosign generate-key-pair)
#       cosign.pub 내용을 아래에 붙여넣기
# 실행: kubectl apply -f cosign-verify-policy.yaml

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signature
  annotations:
    policies.kyverno.io/title: Verify Image Signature
    policies.kyverno.io/description: >
      Harbor에 push된 이미지는 반드시 Cosign으로 서명되어야 합니다.
      미서명 이미지는 tutum-app 네임스페이스에 배포할 수 없습니다.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: verify-cosign-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - tutum-app
      verifyImages:
        - imageReferences:
            - "192.168.56.12:8080/tutum/*"
          attestors:
            - entries:
                - keys:
                    # cosign generate-key-pair 실행 후 cosign.pub 내용으로 교체
                    publicKeys: |-
                      -----BEGIN PUBLIC KEY-----
                      <cosign.pub 내용을 여기에 붙여넣기>
                      -----END PUBLIC KEY-----
