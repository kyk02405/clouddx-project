# Step 3-1: Grafana Alloy DaemonSet (K8s 클러스터 내 설치)
# 전제: monitoring 네임스페이스가 존재해야 함 (Step 1에서 생성)
# 실행: kubectl apply -f 01-alloy-daemonset.yaml

---
# Alloy 설정 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
data:
  config.alloy: |
    // ============================================
    // 1. Kubernetes 서비스 디스커버리
    // ============================================
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.kubernetes "nodes" {
      role = "node"
    }

    // ============================================
    // 2. Target 레이블 변환 (scrape 전 수행)
    // ============================================
    // discovery.relabel: __meta_kubernetes_* 레이블을 scrape 전 target 레이블로 변환
    // (prometheus.relabel은 scrape 후 메트릭에만 적용 → __meta_* 접근 불가)
    discovery.relabel "pod_meta" {
      targets = discovery.kubernetes.pods.targets

      // prometheus.io/scrape: "true" 파드만 수집
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
        action        = "keep"
        regex         = "true"
      }

      // 커스텀 메트릭 경로 (prometheus.io/path 어노테이션)
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
        action        = "replace"
        target_label  = "__metrics_path__"
        regex         = "(.+)"
      }

      // 커스텀 포트 (prometheus.io/port 어노테이션)
      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
        action        = "replace"
        regex         = "([^:]+)(?::\\d+)?;(\\d+)"
        replacement   = "$1:$2"
        target_label  = "__address__"
      }

      // namespace 레이블
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }

      // pod 레이블
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }

      // app 레이블
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }
    }

    // ============================================
    // 3. Metrics → Mimir (192.168.0.230:9009)
    // ============================================
    prometheus.scrape "k8s_pods" {
      targets         = discovery.relabel.pod_meta.output
      forward_to      = [prometheus.remote_write.mimir.receiver]
      scrape_interval = "30s"
    }

    prometheus.scrape "node_metrics" {
      targets         = discovery.kubernetes.nodes.targets
      forward_to      = [prometheus.remote_write.mimir.receiver]
      scrape_interval = "30s"
    }

    prometheus.remote_write "mimir" {
      endpoint {
        url = "http://192.168.0.230:9009/api/v1/push"
      }
    }

    // ============================================
    // 4. Logs → Loki (192.168.0.230:3100)
    // ============================================
    loki.source.kubernetes "k8s_logs" {
      targets    = discovery.kubernetes.pods.targets
      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = "http://192.168.0.230:3100/loki/api/v1/push"
      }
    }

    // ============================================
    // 5. Traces → Tempo (192.168.0.230:4317)
    // ============================================
    otelcol.receiver.otlp "default" {
      grpc { endpoint = "0.0.0.0:4317" }
      http { endpoint = "0.0.0.0:4318" }
      output {
        traces = [otelcol.exporter.otlp.tempo.input]
      }
    }

    otelcol.exporter.otlp "tempo" {
      client {
        endpoint = "192.168.0.230:4317"
        tls { insecure = true }
      }
    }
---
# Alloy ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: monitoring
---
# ClusterRole: 전체 클러스터 Pod/Node 메트릭/로그 수집 권한
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - nodes/metrics
      - services
      - endpoints
      - pods
      - pods/log
      - namespaces
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: monitoring
---
# Alloy DaemonSet: 모든 K8s 노드에 1개씩 배포
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/instance: alloy
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: alloy
      app.kubernetes.io/instance: alloy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alloy
        app.kubernetes.io/instance: alloy
    spec:
      serviceAccountName: alloy
      tolerations:
        # control-plane 노드에도 배포
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: alloy
          image: grafana/alloy:v1.13.0
          args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/var/lib/alloy/data
            - --server.http.listen-addr=0.0.0.0:12345
          ports:
            - name: http-metrics
              containerPort: 12345
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: storage
              mountPath: /var/lib/alloy/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: storage
          emptyDir: {}
      hostNetwork: false
      hostPID: false
