# Step 3-1: Grafana Alloy DaemonSet (K8s 클러스터 내 설치)
# 전제: monitoring 네임스페이스가 존재해야 함 (Step 1에서 생성)
# 실행: kubectl apply -f 01-alloy-daemonset.yaml

---
# Alloy 설정 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
data:
  config.alloy: |
    // ============================================
    // 1. Kubernetes 서비스 디스커버리
    // ============================================
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.kubernetes "nodes" {
      role = "node"
    }

    // ============================================
    // 2. Metrics → Mimir (192.168.56.30:9009)
    // ============================================
    prometheus.scrape "k8s_pods" {
      targets         = discovery.kubernetes.pods.targets
      forward_to      = [prometheus.remote_write.mimir.receiver]
      scrape_interval = "30s"
    }

    prometheus.scrape "node_metrics" {
      targets         = discovery.kubernetes.nodes.targets
      forward_to      = [prometheus.remote_write.mimir.receiver]
      scrape_interval = "30s"
    }

    prometheus.remote_write "mimir" {
      endpoint {
        url = "http://192.168.56.30:9009/api/v1/push"
      }
    }

    // ============================================
    // 3. Logs → Loki (192.168.56.30:3100)
    // ============================================
    loki.source.kubernetes "k8s_logs" {
      targets    = discovery.kubernetes.pods.targets
      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = "http://192.168.56.30:3100/loki/api/v1/push"
      }
    }

    // ============================================
    // 4. Traces → Tempo (192.168.56.30:4317)
    // ============================================
    otelcol.receiver.otlp "default" {
      grpc { endpoint = "0.0.0.0:4317" }
      http { endpoint = "0.0.0.0:4318" }
      output {
        traces = [otelcol.exporter.otlp.tempo.input]
      }
    }

    otelcol.exporter.otlp "tempo" {
      client {
        endpoint = "192.168.56.30:4317"
        tls { insecure = true }
      }
    }
---
# Alloy ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: monitoring
---
# ClusterRole: 전체 클러스터 Pod/Node 메트릭/로그 수집 권한
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - nodes/metrics
      - services
      - endpoints
      - pods
      - namespaces
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: monitoring
---
# Alloy DaemonSet: 모든 K8s 노드에 1개씩 배포
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  namespace: monitoring
  labels:
    app: alloy
spec:
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      serviceAccountName: alloy
      tolerations:
        # control-plane 노드에도 배포
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: alloy
          image: grafana/alloy:v1.1.0
          args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/var/lib/alloy/data
            - --server.http.listen-addr=0.0.0.0:12345
          ports:
            - name: http-metrics
              containerPort: 12345
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: storage
              mountPath: /var/lib/alloy/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: storage
          emptyDir: {}
      hostNetwork: false
      hostPID: false
