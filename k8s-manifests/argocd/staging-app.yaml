apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tutum-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.com/tutum/clouddx-project.git
    targetRevision: develop
    path: k8s-manifests/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: tutum-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
