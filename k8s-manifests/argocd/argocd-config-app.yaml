# ArgoCD self-management Application (kustomize 방식)
# ArgoCD 컴포넌트를 private-only 노드로 고정하고 repo-server 타임아웃 설정
# base: ArgoCD v3.3.2 upstream install.yaml + SMP 패치
# 실행: kubectl apply -f k8s-manifests/argocd/argocd-config-app.yaml -n argocd

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://gitlab.com/tutum-project/tutum-app/backend.git
    targetRevision: develop
    path: k8s-manifests/apps/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/replicas
