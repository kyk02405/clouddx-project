apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tutum-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.com/tutum/clouddx-project.git
    targetRevision: main
    path: k8s-manifests/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: tutum-app
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
