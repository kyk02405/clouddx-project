# ArgoCD 컴포넌트 private-only nodeSelector 패치 (kustomize SMP)
# 목적: default nodeclass 노드(NAT 없음)에서 이미지 pull 실패 방지
# namespace는 kustomization.yaml base의 리소스 namespace에 맞춰 지정 안 함
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-server
spec:
  template:
    spec:
      nodeSelector:
        eks.amazonaws.com/nodeclass: private-only
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
spec:
  template:
    spec:
      nodeSelector:
        eks.amazonaws.com/nodeclass: private-only
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-applicationset-controller
spec:
  template:
    spec:
      nodeSelector:
        eks.amazonaws.com/nodeclass: private-only
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-notifications-controller
spec:
  template:
    spec:
      nodeSelector:
        eks.amazonaws.com/nodeclass: private-only
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-dex-server
spec:
  template:
    spec:
      nodeSelector:
        eks.amazonaws.com/nodeclass: private-only
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-redis
spec:
  template:
    spec:
      nodeSelector:
        eks.amazonaws.com/nodeclass: private-only
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argocd-application-controller
spec:
  template:
    spec:
      nodeSelector:
        eks.amazonaws.com/nodeclass: private-only
