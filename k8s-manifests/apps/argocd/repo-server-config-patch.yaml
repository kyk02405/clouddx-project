# argocd-repo-server 추가 설정 패치 (kustomize SMP)
# - manifest generation timeout 300s (kustomize build 메모리 부족 대응)
# - resource requests/limits 명시 (eviction 방지)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
spec:
  template:
    spec:
      containers:
        - name: argocd-repo-server
          env:
            - name: ARGOCD_REPO_SERVER_TIMEOUT_SECONDS
              value: "300"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
