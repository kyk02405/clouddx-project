apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-worker
  namespace: tutum-app
  labels:
    app: email-worker
    app.kubernetes.io/name: email-worker
    app.kubernetes.io/part-of: tutum
spec:
  replicas: 1
  selector:
    matchLabels:
      app: email-worker
  template:
    metadata:
      labels:
        app: email-worker
    spec:
      imagePullSecrets:
        - name: gitlab-registry-secret
      containers:
        - name: email-worker
          image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/tutum/backend:latest
          command: ["python", "-u", "workers/email_worker.py"]
          envFrom:
            - secretRef:
                name: backend-secret
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.tutum-data.svc.cluster.local:9092"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
