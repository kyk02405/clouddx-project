apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-producer
  namespace: tutum-app
  labels:
    app: price-producer
    app.kubernetes.io/name: price-producer
    app.kubernetes.io/part-of: tutum
spec:
  replicas: 1
  selector:
    matchLabels:
      app: price-producer
  template:
    metadata:
      labels:
        app: price-producer
    spec:
      imagePullSecrets:
        - name: gitlab-registry-secret
      containers:
        - name: price-producer
          image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/tutum/workers:latest
          command: ["python", "-u", "price_producer.py"]
          envFrom:
            - secretRef:
                name: backend-secret
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.tutum-data.svc.cluster.local:9092"
            - name: KIS_DOMESTIC_SYMBOLS
              value: ""
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
