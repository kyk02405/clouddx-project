apiVersion: apps/v1
kind: Deployment
metadata:
  name: elastic-consumer
  namespace: tutum-app
  labels:
    app: elastic-consumer
    app.kubernetes.io/name: elastic-consumer
    app.kubernetes.io/part-of: tutum
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elastic-consumer
  template:
    metadata:
      labels:
        app: elastic-consumer
    spec:
      imagePullSecrets:
        - name: gitlab-registry-secret
      containers:
        - name: elastic-consumer
          image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/tutum/workers:latest
          imagePullPolicy: Always
          command: ["python", "-u", "elastic_consumer.py"]
          envFrom:
            - configMapRef:
                name: news-pipeline-config
            - secretRef:
                name: news-pipeline-secret
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: AWS_REGION
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
