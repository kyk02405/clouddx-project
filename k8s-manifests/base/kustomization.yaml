apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - frontend/deployment.yaml
  - frontend/service.yaml
  - backend/deployment.yaml
  - backend/service.yaml
  - data/mongodb.yaml
  - data/redis.yaml
  - data/kafka.yaml
  - data/elasticsearch.yaml
  - data/kibana.yaml
  - storage/minio-secret.yaml
  - storage/minio.yaml
  - workers/price-producer.yaml
  - workers/price-consumer.yaml
  - workers/email-worker.yaml
  - workers/news-configmap.yaml
  - workers/news-secret.yaml
  - workers/news-producer.yaml
  - workers/news-consumer.yaml
  - workers/elastic-consumer.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/managed-by: kustomize