---
# External Secrets Operator wiring for app and backup secrets.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets-store
  namespace: tutum-app
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backend-secret
  namespace: tutum-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: backend-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: tutum/backend-secret
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets-store
  namespace: tutum-data
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: s3-backup-secret
  namespace: tutum-data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: s3-backup-secret
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: tutum/backend-secret
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: tutum/backend-secret
        property: AWS_SECRET_ACCESS_KEY
    - secretKey: AWS_REGION
      remoteRef:
        key: tutum/backend-secret
        property: AWS_REGION
    - secretKey: S3_BUCKET_NAME
      remoteRef:
        key: tutum/backend-secret
        property: S3_BUCKET_NAME
    - secretKey: MONGODB_URL
      remoteRef:
        key: tutum/backend-secret
        property: MONGODB_URL
