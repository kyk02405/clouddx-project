# ==========================================================
# NetworkPolicy - tutum-data 네임스페이스
# 허용: tutum-app (앱→DB), monitoring (Alloy 스크랩), 네임스페이스 내부
# ==========================================================

# 1. 기본 차단 (tutum-data)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: tutum-data
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# 2. tutum-app 허용 (Backend/Workers → MongoDB/Redis/Kafka/ES)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-tutum-app
  namespace: tutum-data
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tutum-app

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-tutum-prod-app
  namespace: tutum-data
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tutum-prod-app

---
# 3. monitoring 허용 (Alloy → exporter /metrics 스크랩)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-monitoring
  namespace: tutum-data
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring

---
# 4. keda 허용 (KEDA operator → Kafka Consumer Lag 메트릭 수집)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-keda
  namespace: tutum-data
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keda

---
# 5. 네임스페이스 내부 허용 (redis-exporter→Redis, kafka-exporter→Kafka, MongoDB 레플리카 통신)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: tutum-data
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}

---
# ==========================================================
# NetworkPolicy - tutum-app 네임스페이스
# 허용: istio-system (Gateway), monitoring (Alloy 스크랩), 네임스페이스 내부
# ==========================================================

# 6. 기본 차단 (tutum-app)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: tutum-app
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# 6. istio-system 허용 (Istio IngressGateway → Frontend/Backend)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-istio
  namespace: tutum-app
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system

---
# 7. monitoring 허용 (Alloy → /metrics 스크랩)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-monitoring
  namespace: tutum-app
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring

---
# 8. 네임스페이스 내부 허용 (Istio sidecar 간 통신 포함)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: tutum-app
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
