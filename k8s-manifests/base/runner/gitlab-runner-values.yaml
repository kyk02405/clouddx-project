# GitLab Runner on EKS (tutum-stg-eks)
# Inject runnerToken during helm install/upgrade with --set runnerToken=<token>.
# chart: gitlab/gitlab-runner v0.86.0
# Images are mirrored to ECR for private subnet pulls.

gitlabUrl: "https://gitlab.com/"
runnerToken: ""

concurrent: 10
checkInterval: 3
logLevel: "info"

image:
  registry: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com
  image: gitlab-org/gitlab-runner
  tag: alpine-v18.9.0

runners:
  config: |
    [[runners]]
      executor = "kubernetes"
      tags = "k8s"
      [runners.kubernetes]
        namespace = "gitlab-runner"
        image = "ubuntu:22.04"
        privileged = true
        pull_policy = ["if-not-present", "always"]
        helper_image = "903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/gitlab-org/gitlab-runner-helper:x86_64-v18.9.0"
        [runners.kubernetes.node_selector]
          "eks.amazonaws.com/nodeclass" = "private-only"
          "karpenter.sh/nodepool" = "private-ci"
        [[runners.kubernetes.volumes.empty_dir]]
          name = "docker-certs"
          mount_path = "/certs/client"
          medium = "Memory"

rbac:
  create: true

# Keep the runner controller on the dedicated CI pool to isolate CI spikes.
nodeSelector:
  eks.amazonaws.com/nodeclass: private-only
  karpenter.sh/nodepool: private-ci
