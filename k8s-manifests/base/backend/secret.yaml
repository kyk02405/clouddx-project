# Harbor 레지스트리 접근 Secret
# 실행: kubectl create secret docker-registry harbor-secret \
#   -n tutum-app \
#   --docker-server=192.168.56.12:8080 \
#   --docker-username=admin \
#   --docker-password=Himedia123!
# 위 명령어로 생성하거나 아래 YAML 사용 (base64 인코딩 필요)
apiVersion: v1
kind: Secret
metadata:
  name: harbor-secret
  namespace: tutum-app
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "192.168.56.12:8080": {
          "username": "admin",
          "password": "Himedia123!",
          "auth": ""
