# backend-secret: Phase B-13 이후 AWS Secrets Manager + ESO로 관리
# ⚠️ 이 파일은 참조용 — 실제 시크릿은 ESO가 AWS Secrets Manager(tutum/backend-secret)에서 동기화
# ESO SecretStore: k8s-manifests/base/security/eso/secret-store.yaml
# AWS Secrets Manager 시크릿명: tutum/backend-secret
# KMS CMK: alias/tutum-secrets-key
#
# [레거시 수동 생성 방법 - ESO 미사용 시]
#   kubectl create secret generic backend-secret -n tutum-app \
#     --from-literal=MONGODB_URL="mongodb+srv://..." \
#     --from-literal=MARIADB_HOST="<RDS_ENDPOINT>" \
#     --from-literal=MARIADB_PORT="3306" \
#     --from-literal=MARIADB_USER="<DB_USER>" \
#     --from-literal=MARIADB_PASSWORD="<DB_PASSWORD>" \
#     --from-literal=MARIADB_DATABASE="<DB_NAME>"

apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: tutum-app
type: Opaque
stringData:
  # MongoDB (AWS EKS in-cluster replica set)
  MONGODB_URL: "mongodb://mongodb-0.mongodb-headless.tutum-data.svc.cluster.local:27017,mongodb-1.mongodb-headless.tutum-data.svc.cluster.local:27017,mongodb-2.mongodb-headless.tutum-data.svc.cluster.local:27017/clouddx?replicaSet=mongo-rs"
  MONGODB_DB_NAME: "clouddx"
  # MariaDB → AWS RDS (Phase D 완료)
  MARIADB_HOST: "<RDS_ENDPOINT>.ap-northeast-2.rds.amazonaws.com"
  MARIADB_PORT: "3306"
  MARIADB_USER: "<DB_USER>"
  MARIADB_PASSWORD: "<DB_PASSWORD>"
  MARIADB_DATABASE: "<DB_NAME>"
  # App Secret
  SECRET_KEY: "<JWT_SECRET_KEY>"
  # KIS API (한국투자증권)
  KIS_APP_KEY: "<KIS_APP_KEY>"
  KIS_APP_SECRET: "<KIS_APP_SECRET>"
  KIS_MODE: "real"
  # Upbit
  UPBIT_ACCESS_KEY: "<UPBIT_ACCESS_KEY>"
  UPBIT_SECRET_KEY: "<UPBIT_SECRET_KEY>"
  # Google OAuth
  GOOGLE_CLIENT_ID: "<GOOGLE_CLIENT_ID>"
  GOOGLE_CLIENT_SECRET: "<GOOGLE_CLIENT_SECRET>"
  GOOGLE_REDIRECT_URI: "https://<YOUR_DOMAIN>/api/v1/auth/google/callback"
  # Kakao OAuth
  KAKAO_CLIENT_ID: "<KAKAO_CLIENT_ID>"
  KAKAO_CLIENT_SECRET: "<KAKAO_CLIENT_SECRET>"
  KAKAO_REDIRECT_URI: "https://<YOUR_DOMAIN>/api/v1/auth/kakao/callback"
  # Naver OAuth
  NAVER_CLIENT_ID: "<NAVER_CLIENT_ID>"
  NAVER_CLIENT_SECRET: "<NAVER_CLIENT_SECRET>"
  NAVER_REDIRECT_URI: "https://<YOUR_DOMAIN>/api/v1/auth/naver/callback"
  # Frontend URL (OAuth 콜백 리다이렉트 대상)
  FRONTEND_URL: "https://<YOUR_DOMAIN>"
  # AWS Bedrock
  AWS_REGION: "ap-northeast-2"
  S3_BUCKET_NAME: "<S3_BUCKET_NAME>"
  AWS_ACCESS_KEY_ID: "<AWS_ACCESS_KEY_ID>"
  AWS_SECRET_ACCESS_KEY: "<AWS_SECRET_ACCESS_KEY>"
  BEDROCK_MODEL_ID: "global.anthropic.claude-sonnet-4-6"
  # 모니터링 (LGTM Stack — EC2)
  GRAFANA_URL: "http://<MONITORING_HOST>:3000"
  MIMIR_URL: "http://<MONITORING_HOST>:9009/prometheus"
  LOKI_URL: "http://<MONITORING_HOST>:3100"
  TEMPO_URL: "http://<MONITORING_HOST>:3200"
  # Object storage (S3 primary, MinIO fallback remains code-only)
