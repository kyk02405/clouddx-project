# backend-secret: 민감한 환경변수를 K8s Secret으로 관리
# 실행 전 base64 인코딩 필요:
#   echo -n "값" | base64
# 또는 아래 명령어로 직접 생성:
#   kubectl create secret generic backend-secret -n tutum-app \
#     --from-literal=MONGODB_URL="mongodb+srv://..." \
#     --from-literal=MARIADB_HOST="211.46.52.153" \
#     --from-literal=MARIADB_PORT="15432" \
#     --from-literal=MARIADB_USER="team3" \
#     --from-literal=MARIADB_PASSWORD="Gkrtod1@" \
#     --from-literal=MARIADB_DATABASE="team3" \
#     --from-literal=SECRET_KEY="da7e058efadaf0f7fbfd390142700bb4fbe35a281a9ea0e922487918973e9234"

