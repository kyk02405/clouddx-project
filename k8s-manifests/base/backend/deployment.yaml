apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: tutum-app
  labels:
    app: backend
    version: v1
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: tutum
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: backend-sa
      nodeSelector:
        workload: app
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: backend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/tutum/backend:latest
          command:
            - /bin/sh
            - -lc
          args:
            - |
              python <<'PY'
              from pathlib import Path

              path = Path("/app/app/routers/admin.py")
              try:
                  source = path.read_text(encoding="utf-8")
              except FileNotFoundError:
                  raise SystemExit(0)

              if "from bson import ObjectId" not in source and "from botocore.config import Config" in source:
                  source = source.replace(
                      "from botocore.config import Config",
                      "from botocore.config import Config\nfrom bson import ObjectId",
                  )

              if "from motor.motor_asyncio import AsyncIOMotorClient" not in source and "from botocore.config import Config" in source:
                  source = source.replace(
                      "from botocore.config import Config",
                      "from motor.motor_asyncio import AsyncIOMotorClient\nfrom botocore.config import Config",
                  )

              if "from ..config import get_settings" not in source and "from ..database import get_database, get_news_collection" in source:
                  source = source.replace(
                      "from ..database import get_database, get_news_collection",
                      "from ..config import get_settings\nfrom ..database import get_database, get_news_collection",
                  )

              if "settings = get_settings()" not in source and "logger = logging.getLogger(__name__)" in source:
                  source = source.replace(
                      "logger = logging.getLogger(__name__)",
                      "logger = logging.getLogger(__name__)\nsettings = get_settings()\n_ADMIN_MONGO_CLIENT: AsyncIOMotorClient | None = None",
                  )

              helper_block = '''
              def _cpu_usage_to_nano(raw: str) -> int:
                  raw = (raw or "").strip()
                  if not raw:
                      return 0
                  if raw.endswith("n"):
                      return int(float(raw[:-1] or 0))
                  if raw.endswith("u"):
                      return int(float(raw[:-1]) * 1_000)
                  if raw.endswith("m"):
                      return int(float(raw[:-1]) * 1_000_000)
                  return int(float(raw) * 1_000_000_000)


              def _cpu_capacity_to_millicores(raw: str) -> int:
                  raw = (raw or "").strip()
                  if not raw:
                      return 0
                  if raw.endswith("n"):
                      return int(float(raw[:-1]) / 1_000_000)
                  if raw.endswith("u"):
                      return int(float(raw[:-1]) / 1_000)
                  if raw.endswith("m"):
                      return int(float(raw[:-1]))
                  return int(float(raw) * 1000)


              def _memory_quantity_to_ki(raw: str) -> int:
                  raw = (raw or "").strip()
                  if not raw:
                      return 0

                  binary_units = {
                      "Ki": 1,
                      "Mi": 1024,
                      "Gi": 1024 ** 2,
                      "Ti": 1024 ** 3,
                      "Pi": 1024 ** 4,
                      "Ei": 1024 ** 5,
                  }
                  decimal_units = {
                      "K": 1000 / 1024,
                      "M": 1000 ** 2 / 1024,
                      "G": 1000 ** 3 / 1024,
                      "T": 1000 ** 4 / 1024,
                      "P": 1000 ** 5 / 1024,
                      "E": 1000 ** 6 / 1024,
                  }

                  for suffix, multiplier in binary_units.items():
                      if raw.endswith(suffix):
                          return int(float(raw[:-len(suffix)] or 0) * multiplier)

                  for suffix, multiplier in decimal_units.items():
                      if raw.endswith(suffix):
                          return int(float(raw[:-len(suffix)] or 0) * multiplier)

                  return int(float(raw) / 1024)
              '''.strip()

              pipeline_helper_block = '''
              async def _count_distinct_indexable_news(news_col) -> int:
                  rows = await news_col.aggregate([
                      {
                          "$match": {
                              "title": {"$exists": True, "$type": "string", "$ne": ""},
                              "$or": [
                                  {"content": {"$exists": True, "$type": "string", "$ne": ""}},
                                  {"body": {"$exists": True, "$type": "string", "$ne": ""}},
                              ],
                          }
                      },
                      {"$project": {"key": {"$ifNull": ["$url", "$link"]}}},
                      {"$match": {"key": {"$exists": True, "$type": "string", "$ne": ""}}},
                      {"$group": {"_id": "$key"}},
                      {"$count": "count"},
                  ]).to_list(length=1)
                  return int(rows[0]["count"]) if rows else 0


              async def _count_distinct_es_news_urls(es_url: str) -> int | None:
                  try:
                      resp = await _HTTP_MISC.post(
                          f"{es_url}/news/_search?size=0",
                          json={
                              "aggs": {
                                  "distinct_urls": {
                                      "cardinality": {"field": "url", "precision_threshold": 40000}
                                  }
                              }
                          },
                      )
                      if resp.status_code == 200:
                          return int(
                              resp.json()
                              .get("aggregations", {})
                              .get("distinct_urls", {})
                              .get("value", 0)
                          )
                  except Exception:
                      return None
                  return None
              '''.strip()

              mongo_helper_block = '''
              def _get_admin_news_collection():
                  news_col = get_news_collection()
                  if news_col is not None:
                      return news_col

                  db = get_database()
                  if db is not None:
                      return db["news"]

                  global _ADMIN_MONGO_CLIENT
                  if _ADMIN_MONGO_CLIENT is None:
                      _ADMIN_MONGO_CLIENT = AsyncIOMotorClient(
                          settings.MONGODB_URL,
                          serverSelectionTimeoutMS=2000,
                      )
                  return _ADMIN_MONGO_CLIENT[settings.MONGODB_DB_NAME]["news"]


              async def _count_recent_distinct_news(news_col, since: datetime) -> int:
                  rows = await news_col.aggregate([
                      {
                          "$match": {
                              "title": {"$exists": True, "$type": "string", "$ne": ""},
                              "$or": [
                                  {"content": {"$exists": True, "$type": "string", "$ne": ""}},
                                  {"body": {"$exists": True, "$type": "string", "$ne": ""}},
                              ],
                          }
                      },
                      {
                          "$addFields": {
                              "_recent_key": {"$ifNull": ["$url", "$link"]},
                              "_recent_ts": {"$toDate": {"$ifNull": ["$ingested_at", "$created_at"]}},
                          }
                      },
                      {
                          "$match": {
                              "_recent_key": {"$exists": True, "$type": "string", "$ne": ""},
                              "_recent_ts": {"$gte": since},
                          }
                      },
                      {"$group": {"_id": "$_recent_key"}},
                      {"$count": "count"},
                  ]).to_list(length=1)
                  return int(rows[0]["count"]) if rows else 0
              '''.strip()

              anchor = '''def _node_status(node) -> str:
                  for cond in (node.status.conditions or []):
                      if cond.type == "Ready":
                          return "Ready" if cond.status == "True" else "NotReady"
                  return "Unknown"
              '''

              if "_memory_quantity_to_ki(" not in source and anchor in source:
                  source = source.replace(anchor, anchor + "\n\n" + helper_block + "\n")

              pipeline_anchor = "_PIPELINE_WORKERS = _ALL_WORKERS"
              if "_count_distinct_indexable_news(" not in source and pipeline_anchor in source:
                  source = source.replace(
                      pipeline_anchor,
                      pipeline_anchor + "\n\n" + pipeline_helper_block,
                      1,
                  )

              es_helper_anchor = "async def _count_distinct_es_news_urls(es_url: str) -> int | None:"
              if "_get_admin_news_collection(" not in source and es_helper_anchor in source:
                  source = source.replace(
                      es_helper_anchor,
                      mongo_helper_block + "\n\n" + es_helper_anchor,
                      1,
                  )

              replacements = {
                  '_HTTP_MIMIR = httpx.AsyncClient(timeout=5.0)': '_HTTP_MIMIR = httpx.AsyncClient(timeout=5.0, headers={"X-Scope-OrgID": "tutum"})',
                  '_HTTP_LOKI = httpx.AsyncClient(timeout=8.0)': '_HTTP_LOKI = httpx.AsyncClient(timeout=8.0, headers={"X-Scope-OrgID": "tutum"})',
                  "base_selector = f'{{job=\"loki.source.kubernetes.k8s_logs\", instance=~\"{ns_pattern}/.*\"}}'": "base_selector = f'{{job=\"loki.source.kubernetes.pods\", namespace=~\"{ns_pattern}\"}}'",
                  "instance = labels.get(\"instance\", \"\")\\n            level = labels.get(\"level\", default_level).upper()\\n            ns_pod = instance.split(\":\")[0]\\n            parts = ns_pod.split(\"/\", 1)\\n            ns_name = parts[0] if len(parts) == 2 else \"\"\\n            pod_name = parts[1] if len(parts) == 2 else instance": "level = labels.get(\"level\", labels.get(\"detected_level\", default_level)).upper()\\n            ns_name = labels.get(\"namespace\", \"\")\\n            pod_name = labels.get(\"pod\", labels.get(\"instance\", \"\"))",
                  "query = f'{{job=\"loki.source.kubernetes.k8s_logs\", instance=~\"tutum-app/{worker}-.*\"}}'": "query = f'{{job=\"loki.source.kubernetes.pods\", namespace=\"tutum-app\", app=~\"{worker}.*\"}}'",
                  "\"query\": '{job=\"loki.source.kubernetes.k8s_logs\"} |= \"ERROR\"',": "\"query\": '{job=\"loki.source.kubernetes.pods\"} |= \"ERROR\"',",
                  'level = labels.get("level", default_level).upper()': 'level = labels.get("level", labels.get("detected_level", default_level)).upper()',
                  'cpu_nano = int(item[\"usage\"][\"cpu\"].rstrip(\"n\"))': 'cpu_nano = _cpu_usage_to_nano(item[\"usage\"][\"cpu\"])',
                  'mem_ki = int(item[\"usage\"][\"memory\"].rstrip(\"Ki\"))': 'mem_ki = _memory_quantity_to_ki(item[\"usage\"][\"memory\"])',
                  'cpu_m = int(float(cpu_str)) * 1000 if not cpu_str.endswith(\"m\") else int(cpu_str[:-1])': 'cpu_m = _cpu_capacity_to_millicores(cpu_str)',
                  'mem_ki = int(mem_str[:-2]) if mem_str.endswith(\"Ki\") else int(mem_str) // 1024': 'mem_ki = _memory_quantity_to_ki(mem_str)',
                  'sum(node_filesystem_size_bytes{mountpoint="/"})': 'sum(max by (instance) (node_filesystem_size_bytes{mountpoint=~"/var|/local|/mnt|/opt",fstype!~"tmpfs|erofs"}))',
                  'sum(node_filesystem_avail_bytes{mountpoint="/"})': 'sum(max by (instance) (node_filesystem_avail_bytes{mountpoint=~"/var|/local|/mnt|/opt",fstype!~"tmpfs|erofs"}))',
                  'node_filesystem_size_bytes{mountpoint="/"}': 'max by (instance) (node_filesystem_size_bytes{mountpoint=~"/var|/local|/mnt|/opt",fstype!~"tmpfs|erofs"})',
                  'node_filesystem_avail_bytes{mountpoint="/"}': 'max by (instance) (node_filesystem_avail_bytes{mountpoint=~"/var|/local|/mnt|/opt",fstype!~"tmpfs|erofs"})',
                  '"available":      raw.get("disk_read_bps") is not None,': '"available":      (raw.get("disk_total_bytes") is not None or raw.get("disk_avail_bytes") is not None or bool(disk_nodes)),',
              }

              updated = source
              for old, new in replacements.items():
                  updated = updated.replace(old, new)

              updated = updated.replace(
                  '            total = await news_col.count_documents({})',
                  '            total = await _count_distinct_indexable_news(news_col)',
              )
              updated = updated.replace(
                  '        resp = await _HTTP_MISC.get(f"{es_url}/news/_count")\n        if resp.status_code == 200:\n            out["elasticsearch"] = {"news_docs": resp.json().get("count", 0), "available": True}',
                  '        distinct_count = await _count_distinct_es_news_urls(es_url)\n        if distinct_count is not None:\n            out["elasticsearch"] = {"news_docs": distinct_count, "available": True}\n        else:\n            resp = await _HTTP_MISC.get(f"{es_url}/news/_count")\n            if resp.status_code == 200:\n                out["elasticsearch"] = {"news_docs": resp.json().get("count", 0), "available": True}',
              )
              updated = updated.replace(
                  '            recent = await news_col.count_documents({"published_at": {"$gte": one_hour_ago}})',
                  '            recent = await _count_recent_distinct_news(news_col, one_hour_ago)',
              )
              updated = updated.replace(
                  '            recent = await news_col.count_documents(\n                {"_id": {"$gte": ObjectId.from_datetime(one_hour_ago.replace(tzinfo=None))}}\n            )',
                  '            recent = await _count_recent_distinct_news(news_col, one_hour_ago)',
              )
              updated = updated.replace(
                  '        news_col = get_news_collection()',
                  '        news_col = _get_admin_news_collection()',
              )
              updated = updated.replace(
                  '    {"name": "etcd-backup", "namespace": "kube-system", "label": "etcd"},\n',
                  "",
              )

              if updated != source:
                  path.write_text(updated, encoding="utf-8")
                  print("[BackendPatch] admin.py monitoring headers injected")
              else:
                  print("[BackendPatch] admin.py already patched")
              PY
              exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: backend-secret
          env:
            - name: MONGODB_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MONGODB_URL
            - name: REDIS_URL
              value: "redis://redis.tutum-data.svc.cluster.local:6379"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.tutum-data.svc.cluster.local:9092"
            - name: MARIADB_HOST
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MARIADB_HOST
            - name: MARIADB_PORT
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MARIADB_PORT
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MARIADB_USER
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MARIADB_PASSWORD
            - name: MARIADB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MARIADB_DATABASE
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: SECRET_KEY
          resources:
            requests:
              cpu: 600m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 3Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
      imagePullSecrets:
        - name: gitlab-registry-secret
