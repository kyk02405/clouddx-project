apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: tutum-app
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: tutum-data
spec:
  mtls:
    mode: STRICT
---
# KEDA operator (keda ns, Istio sidecar 없음)가 Kafka 9092에 접근할 수 있도록
# Kafka pod의 9092 포트만 PERMISSIVE로 허용 (다른 포트는 STRICT 유지)
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: kafka-permissive
  namespace: tutum-data
spec:
  selector:
    matchLabels:
      app: kafka
  portLevelMtls:
    "9092":
      mode: PERMISSIVE
---
# mongodb-rs-init Job (sidecar.istio.io/inject: "false")이 MongoDB 27017에 접근할 수 있도록
# MongoDB pod의 27017 포트만 PERMISSIVE로 허용
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: mongodb-permissive
  namespace: tutum-data
spec:
  selector:
    matchLabels:
      app: mongodb
  portLevelMtls:
    "27017":
      mode: PERMISSIVE
