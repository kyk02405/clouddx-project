apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: tutum-app
  labels:
    app: backend
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: tutum
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: tutum-app
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: tutum
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
