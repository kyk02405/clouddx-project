apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: tutum-data
  labels:
    app: kafka
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: tutum
spec:
  selector:
    app: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: tutum-data
  labels:
    app: kafka
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: tutum
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
      protocol: TCP
    - name: controller
      port: 9093
      targetPort: 9093
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: tutum-data
  labels:
    app: kafka
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: tutum
spec:
  serviceName: kafka-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: kafka
              topologyKey: kubernetes.io/hostname
      # Prevent service env injection (e.g., KAFKA_PORT) from breaking cp-kafka env parsing.
      enableServiceLinks: false
      initContainers:
        - name: remove-lost-found
          image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/busybox:1.35
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - rm -rf /var/lib/kafka/data/lost+found && echo 'Cleaned up lost+found'
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
        - name: wait-for-peers
          image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/busybox:1.35
          command:
            - /bin/sh
            - -c
            - |
              PEERS="kafka-0.kafka-headless.tutum-data.svc.cluster.local kafka-1.kafka-headless.tutum-data.svc.cluster.local kafka-2.kafka-headless.tutum-data.svc.cluster.local"
              for peer in $PEERS; do
                echo "Waiting for $peer DNS..."
                until nslookup $peer > /dev/null 2>&1; do sleep 2; done
                echo "$peer is resolvable"
              done
              echo "All Kafka peers resolvable. Starting Kafka."
      containers:
        - name: kafka
          image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/confluentinc/cp-kafka:7.5.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -ec
            - |
              export KAFKA_NODE_ID="${HOSTNAME##*-}"
              export KAFKA_ADVERTISED_LISTENERS="PLAINTEXT://${HOSTNAME}.kafka-headless.tutum-data.svc.cluster.local:9092"
              /etc/confluent/docker/run
          ports:
            - containerPort: 9092
              name: kafka
            - containerPort: 9093
              name: controller
          env:
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qk"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "0@kafka-0.kafka-headless.tutum-data.svc.cluster.local:9093,1@kafka-1.kafka-headless.tutum-data.svc.cluster.local:9093,2@kafka-2.kafka-headless.tutum-data.svc.cluster.local:9093"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "2"
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_MIN_INSYNC_REPLICAS
              value: "2"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
