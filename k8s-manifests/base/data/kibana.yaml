apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: tutum-data
  labels:
    app: kibana
    app.kubernetes.io/name: kibana
    app.kubernetes.io/part-of: tutum
spec:
  selector:
    app: kibana
  ports:
    - name: http
      port: 5601
      targetPort: 5601
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: tutum-data
  labels:
    app: kibana
    app.kubernetes.io/name: kibana
    app.kubernetes.io/part-of: tutum
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      nodeSelector:
        workload: data
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.17.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5601
              name: http
          env:
            - name: SERVER_NAME
              value: kibana
            - name: ELASTICSEARCH_HOSTS
              value: http://elasticsearch.tutum-data.svc.cluster.local:9200
            - name: XPACK_SECURITY_ENABLED
              value: "false"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 5601
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5601
            initialDelaySeconds: 30
            periodSeconds: 10