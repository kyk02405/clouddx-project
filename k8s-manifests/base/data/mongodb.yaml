apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: tutum-data
  labels:
    app: mongodb
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: tutum
spec:
  selector:
    app: mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
  namespace: tutum-data
  labels:
    app: mongodb
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: tutum
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: tutum-data
  labels:
    app: mongodb
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: tutum
spec:
  serviceName: mongodb-headless
  replicas: 3
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - mongodb
              topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 30
      containers:
        - name: mongodb
          image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/mongo:7.0
          imagePullPolicy: IfNotPresent
          command: ["mongod"]
          args:
            - "--replSet"
            - "mongo-rs"
            - "--bind_ip_all"
            - "--port"
            - "27017"
            - "--dbpath"
            - "/data/db"
          ports:
            - containerPort: 27017
              name: mongodb
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - >
                  mongosh --quiet --eval "db.adminCommand('ping').ok" |
                  grep 1
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 30Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-rs-init
  namespace: tutum-data
  labels:
    app: mongodb
    app.kubernetes.io/name: mongodb-rs-init
    app.kubernetes.io/part-of: tutum
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: mongodb-rs-init
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongodb-rs-init
          image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/mongo:7.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              echo "[1/3] Waiting for mongodb-0 to accept connections..."
              until mongosh --host mongodb-0.mongodb-headless.tutum-data.svc.cluster.local --quiet --eval "db.adminCommand('ping').ok" | grep 1; do
                sleep 3
              done

              echo "[2/3] Checking replica set state..."
              if mongosh --host mongodb-0.mongodb-headless.tutum-data.svc.cluster.local --quiet --eval "try { rs.status().ok } catch(e) { 0 }" | grep 1; then
                echo "Replica set already initialized. Exiting."
                exit 0
              fi

              echo "[3/3] Initializing replica set..."
              mongosh --host mongodb-0.mongodb-headless.tutum-data.svc.cluster.local <<'EOS'
              rs.initiate({
                _id: "mongo-rs",
                members: [
                  { _id: 0, host: "mongodb-0.mongodb-headless.tutum-data.svc.cluster.local:27017" },
                  { _id: 1, host: "mongodb-1.mongodb-headless.tutum-data.svc.cluster.local:27017" },
                  { _id: 2, host: "mongodb-2.mongodb-headless.tutum-data.svc.cluster.local:27017" }
                ]
              })
              EOS
