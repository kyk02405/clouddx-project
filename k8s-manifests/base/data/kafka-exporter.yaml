apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: tutum-data
  labels:
    app: kafka-exporter
    app.kubernetes.io/name: kafka-exporter
    app.kubernetes.io/part-of: tutum
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
        app.kubernetes.io/name: kafka-exporter
        app.kubernetes.io/part-of: tutum
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9308"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: kafka-exporter
          image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/danielqsj/kafka-exporter:latest
          imagePullPolicy: IfNotPresent
          args:
            - --kafka.server=kafka.tutum-data.svc.cluster.local:9092
            - --kafka.version=3.5.0
          ports:
            - containerPort: 9308
              name: metrics
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9308
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9308
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: tutum-data
  labels:
    app: kafka-exporter
    app.kubernetes.io/name: kafka-exporter
    app.kubernetes.io/part-of: tutum
spec:
  selector:
    app: kafka-exporter
  ports:
    - name: metrics
      port: 9308
      targetPort: 9308
      protocol: TCP
