apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
data:
  config.alloy: |
    // ── Prometheus metrics scraping ──────────────────────────────────────
    // annotation 기반 relabeling: prometheus.io/scrape, /port, /path 적용
    // Istio sidecar가 주입된 pod는 port:15020, path:/stats/prometheus 로 덮어씌워지므로
    // 해당 annotation을 그대로 사용해 merged metrics(app+envoy)를 스크레이프함
    discovery.relabel "pods_scrape" {
      targets = discovery.kubernetes.pods.targets

      // prometheus.io/scrape: "true" 인 pod만 스크레이프
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
        action        = "keep"
        regex         = "true"
      }

      // prometheus.io/path annotation으로 scrape path 오버라이드
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
        action        = "replace"
        target_label  = "__metrics_path__"
        regex         = "(.+)"
      }

      // prometheus.io/port annotation으로 scrape port 오버라이드
      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
        action        = "replace"
        regex         = "([^:]+)(?::\\d+)?;(\\d+)"
        replacement   = "$1:$2"
        target_label  = "__address__"
      }

      // 식별용 label 추가
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }
    }

    prometheus.scrape "kubernetes_pods" {
      targets    = discovery.relabel.pods_scrape.output
      forward_to = [prometheus.remote_write.mimir.receiver]
      scrape_interval = "30s"
    }

    discovery.kubernetes "pods" {
      role = "pod"
      namespaces {
        names = ["tutum-app", "tutum-data", "monitoring"]
      }
      selectors {
        role  = "pod"
        label = "app"
      }
    }

    prometheus.scrape "kubernetes_nodes" {
      targets    = discovery.kubernetes.nodes.targets
      forward_to = [prometheus.remote_write.mimir.receiver]
      scrape_interval = "30s"
    }

    discovery.kubernetes "nodes" {
      role = "node"
    }

    prometheus.remote_write "mimir" {
      endpoint {
        url = "http://10.60.11.95:9009/api/v1/push"
        headers = {
          "X-Scope-OrgID" = "tutum",
        }
      }
    }

    // ── Loki log collection ───────────────────────────────────────────────
    discovery.kubernetes "log_pods" {
      role = "pod"
    }

    discovery.relabel "log_pods" {
      targets = discovery.kubernetes.log_pods.targets
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.log_pods.output
      forward_to = [loki.write.loki.receiver]
    }

    loki.write "loki" {
      endpoint {
        url = "http://10.60.11.95:3100/loki/api/v1/push"
        tenant_id = "tutum"
      }
    }

    // ── OTLP traces → Tempo ───────────────────────────────────────────────
    otelcol.receiver.otlp "default" {
      grpc { endpoint = "0.0.0.0:4317" }
      http { endpoint = "0.0.0.0:4318" }
      output {
        traces = [otelcol.exporter.otlp.tempo.input]
      }
    }

    otelcol.exporter.otlp "tempo" {
      client {
        endpoint = "10.60.11.95:4317"
        tls { insecure = true }
      }
    }
