apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: tutum-app
  labels:
    app: auth
    version: v1
    app.kubernetes.io/name: auth
    app.kubernetes.io/part-of: tutum
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: backend-sa
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: auth
                topologyKey: kubernetes.io/hostname
      containers:
        - name: auth
          image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/tutum/auth:latest
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              python <<'PY'
              from pathlib import Path

              path = Path("/app/app/routers/auth.py")
              try:
                  source = path.read_text(encoding="utf-8")
              except FileNotFoundError:
                  raise SystemExit(0)

              if "import base64" not in source:
                  source = source.replace(
                      "import secrets\n",
                      "import secrets\nimport base64\nfrom urllib.parse import parse_qs, unquote, urlparse\n",
                      1,
                  )
              elif "from urllib.parse import parse_qs, urlparse" in source and "unquote" not in source:
                  source = source.replace(
                      "from urllib.parse import parse_qs, urlparse\n",
                      "from urllib.parse import parse_qs, unquote, urlparse\n",
                      1,
                  )

              source = source.replace(
                  "def _sanitize_callback_path(callback_url: str | None) -> str | None:\n    if not callback_url:\n        return None\n    callback_url = callback_url.strip()\n    if not callback_url.startswith(\"/\") or callback_url.startswith(\"//\"):\n        return None\n    return callback_url\n",
                  "def _sanitize_callback_path(callback_url: str | None) -> str | None:\n    if not callback_url:\n        return None\n    callback_url = unquote(callback_url).strip()\n    if not callback_url.startswith(\"/\") or callback_url.startswith(\"//\"):\n        return None\n    return callback_url\n",
                  1,
              )
              source = source.replace(
                  '    callback_path = _sanitize_callback_path(request.query_params.get("callbackUrl")) or _extract_oauth_callback_from_referer(request)\n',
                  '    callback_path = _sanitize_callback_path(request.query_params.get("callbackUrl")) or _sanitize_callback_path(request.cookies.get("login_callback")) or _extract_oauth_callback_from_referer(request)\n',
              )
              source = source.replace(
                  'callback_path = _sanitize_callback_path(request.query_params.get("callbackUrl")) or _extract_oauth_callback_from_referer(request)',
                  'callback_path = _sanitize_callback_path(request.query_params.get("callbackUrl")) or _sanitize_callback_path(request.cookies.get("login_callback")) or _extract_oauth_callback_from_referer(request)',
              )

              helper_anchor = 'def _oauth_state_cookie_key(provider: str) -> str:\n    return f"oauth_state_{provider}"\n'
              helper_block = '''
              def _oauth_callback_cookie_key(provider: str) -> str:
                  return f"oauth_callback_{provider}"


              def _sanitize_callback_path(callback_url: str | None) -> str | None:
                  if not callback_url:
                      return None
                  callback_url = unquote(callback_url).strip()
                  if not callback_url.startswith("/") or callback_url.startswith("//"):
                      return None
                  return callback_url


              def _set_oauth_callback_cookie(
                  response: Response, provider: str, callback_url: str | None
              ) -> None:
                  callback_path = _sanitize_callback_path(callback_url)
                  if not callback_path:
                      return

                  secure_cookie, same_site = _oauth_state_cookie_attrs(provider)
                  response.set_cookie(
                      key=_oauth_callback_cookie_key(provider),
                      value=callback_path,
                      httponly=True,
                      path="/",
                      samesite=same_site,
                      secure=secure_cookie,
                      max_age=OAUTH_STATE_COOKIE_MAX_AGE_SECONDS,
                  )


              def _get_oauth_callback_cookie(request: Request, provider: str) -> str | None:
                  return _sanitize_callback_path(
                      request.cookies.get(_oauth_callback_cookie_key(provider))
                  )


              def _clear_oauth_callback_cookie(response: Response, provider: str) -> None:
                  secure_cookie, same_site = _oauth_state_cookie_attrs(provider)
                  response.delete_cookie(
                      key=_oauth_callback_cookie_key(provider),
                      path="/",
                      samesite=same_site,
                      secure=secure_cookie,
                  )
              '''.strip()

              if "_oauth_callback_cookie_key(" not in source and helper_anchor in source:
                  source = source.replace(helper_anchor, helper_anchor + "\n\n" + helper_block + "\n", 1)

              extra_helper_anchor = "\n\nclass UserCreate(BaseModel):"
              extra_helper_block = '''
              def _extract_oauth_callback_from_referer(request: Request) -> str | None:
                  referer = request.headers.get("referer")
                  if not referer:
                      return None

                  try:
                      parsed = urlparse(referer)
                      values = parse_qs(parsed.query).get("callbackUrl") or []
                      return _sanitize_callback_path(values[0]) if values else None
                  except Exception:
                      return None


              def _encode_oauth_state(state: str, callback_url: str | None) -> str:
                  callback_path = _sanitize_callback_path(callback_url)
                  if not callback_path:
                      return state

                  encoded = base64.urlsafe_b64encode(callback_path.encode("utf-8")).decode("ascii").rstrip("=")
                  return f"{state}~{encoded}"


              def _extract_oauth_callback_from_state(state: str | None) -> str | None:
                  if not state or "~" not in state:
                      return None

                  encoded = state.split("~", 1)[1]
                  if not encoded:
                      return None

                  padding = "=" * (-len(encoded) % 4)
                  try:
                      decoded = base64.urlsafe_b64decode((encoded + padding).encode("ascii")).decode("utf-8")
                  except Exception:
                      return None
                  return _sanitize_callback_path(decoded)


              def _resolve_oauth_callback(
                  request: Request, provider: str, state: str | None = None
              ) -> str | None:
                  return (
                      _sanitize_callback_path(request.query_params.get("callbackUrl"))
                      or _sanitize_callback_path(request.cookies.get("login_callback"))
                      or _get_oauth_callback_cookie(request, provider)
                      or _extract_oauth_callback_from_state(state)
                      or _extract_oauth_callback_from_referer(request)
                  )


              def _clear_frontend_login_callback_cookie(response: Response) -> None:
                  response.delete_cookie(
                      key="login_callback",
                      path="/",
                      samesite="lax",
                  )
              '''.strip()
              if "_encode_oauth_state(" not in source and extra_helper_anchor in source:
                  source = source.replace(
                      extra_helper_anchor,
                      "\n\n" + extra_helper_block + extra_helper_anchor,
                      1,
                  )

              source = source.replace(
                  "async def _oauth_issue_token_and_redirect(user_id: str, email: str) -> RedirectResponse:",
                  "async def _oauth_issue_token_and_redirect(\n    user_id: str, email: str, callback_path: str | None = None\n) -> RedirectResponse:",
              )
              source = source.replace(
                  '    response = RedirectResponse(url=f"{frontend_url}/auth/callback")',
                  '    redirect_path = _sanitize_callback_path(callback_path) or "/portfolio/asset"\n    response = RedirectResponse(url=f"{frontend_url}{redirect_path}")',
              )

              source = source.replace(
                  "async def google_login(\n    state: str | None = Query(default=None, min_length=8, max_length=128),\n):",
                  "async def google_login(\n    request: Request,\n    state: str | None = Query(default=None, min_length=8, max_length=128),\n):",
              )
              source = source.replace(
                  '    response = RedirectResponse(google_auth_url)\n    _set_oauth_state_cookie(response, "google", oauth_state)\n    await _remember_oauth_state("google", oauth_state)\n    return response',
                  '    callback_path = _sanitize_callback_path(request.query_params.get("callbackUrl")) or _extract_oauth_callback_from_referer(request)\n    oauth_state = _encode_oauth_state(state or secrets.token_urlsafe(24), callback_path)\n    google_auth_url = (\n        f"https://accounts.google.com/o/oauth2/v2/auth"\n        f"?client_id={settings.GOOGLE_CLIENT_ID}"\n        f"&response_type=code"\n        f"&redirect_uri={settings.GOOGLE_REDIRECT_URI}"\n        f"&scope=openid email profile"\n        f"&access_type=offline"\n        f"&prompt=select_account"\n        f"&state={oauth_state}"\n    )\n    response = RedirectResponse(google_auth_url)\n    _set_oauth_state_cookie(response, "google", oauth_state)\n    _set_oauth_callback_cookie(response, "google", callback_path)\n    await _remember_oauth_state("google", oauth_state)\n    return response',
              )
              source = source.replace(
                  '    # 4. JWT  + ???\n    response = await _oauth_issue_token_and_redirect(user_id, email)\n    _clear_oauth_state_cookie(response, "google")\n    await _clear_oauth_state_cache("google", state)\n    return response',
                  '    # 4. JWT  + ???\n    callback_path = _resolve_oauth_callback(request, "google", state)\n    response = await _oauth_issue_token_and_redirect(user_id, email, callback_path)\n    _clear_oauth_state_cookie(response, "google")\n    _clear_oauth_callback_cookie(response, "google")\n    _clear_frontend_login_callback_cookie(response)\n    await _clear_oauth_state_cache("google", state)\n    return response',
              )

              source = source.replace(
                  "async def kakao_login(\n    state: str | None = Query(default=None, min_length=8, max_length=128),\n):",
                  "async def kakao_login(\n    request: Request,\n    state: str | None = Query(default=None, min_length=8, max_length=128),\n):",
              )
              source = source.replace(
                  '    response = RedirectResponse(kakao_auth_url)\n    _set_oauth_state_cookie(response, "kakao", oauth_state)\n    await _remember_oauth_state("kakao", oauth_state)\n    return response',
                  '    callback_path = _sanitize_callback_path(request.query_params.get("callbackUrl")) or _extract_oauth_callback_from_referer(request)\n    oauth_state = _encode_oauth_state(state or secrets.token_urlsafe(24), callback_path)\n    kakao_auth_url = (\n        f"https://kauth.kakao.com/oauth/authorize"\n        f"?client_id={settings.KAKAO_CLIENT_ID}"\n        f"&redirect_uri={settings.KAKAO_REDIRECT_URI}"\n        f"&response_type=code"\n        f"&prompt=select_account"\n        f"&state={oauth_state}"\n    )\n    response = RedirectResponse(kakao_auth_url)\n    _set_oauth_state_cookie(response, "kakao", oauth_state)\n    _set_oauth_callback_cookie(response, "kakao", callback_path)\n    await _remember_oauth_state("kakao", oauth_state)\n    return response',
              )
              source = source.replace(
                  '    # 4. JWT  + ???\n    response = await _oauth_issue_token_and_redirect(user_id, email)\n    _clear_oauth_state_cookie(response, "kakao")\n    await _clear_oauth_state_cache("kakao", state)\n    return response',
                  '    # 4. JWT  + ???\n    callback_path = _resolve_oauth_callback(request, "kakao", state)\n    response = await _oauth_issue_token_and_redirect(user_id, email, callback_path)\n    _clear_oauth_state_cookie(response, "kakao")\n    _clear_oauth_callback_cookie(response, "kakao")\n    _clear_frontend_login_callback_cookie(response)\n    await _clear_oauth_state_cache("kakao", state)\n    return response',
              )

              source = source.replace(
                  "async def naver_login(\n    state: str | None = Query(default=None, min_length=8, max_length=128),\n):",
                  "async def naver_login(\n    request: Request,\n    state: str | None = Query(default=None, min_length=8, max_length=128),\n):",
              )
              source = source.replace(
                  '    response = RedirectResponse(naver_auth_url)\n    _set_oauth_state_cookie(response, "naver", oauth_state)\n    await _remember_oauth_state("naver", oauth_state)\n    return response',
                  '    callback_path = _sanitize_callback_path(request.query_params.get("callbackUrl")) or _extract_oauth_callback_from_referer(request)\n    oauth_state = _encode_oauth_state(state or secrets.token_urlsafe(24), callback_path)\n\n    naver_auth_url = (\n        f"https://nid.naver.com/oauth2.0/authorize"\n        f"?response_type=code"\n        f"&client_id={settings.NAVER_CLIENT_ID}"\n        f"&redirect_uri={settings.NAVER_REDIRECT_URI}"\n        f"&state={oauth_state}"\n        f"&auth_type=reauthenticate"\n    )\n    response = RedirectResponse(naver_auth_url)\n    _set_oauth_state_cookie(response, "naver", oauth_state)\n    _set_oauth_callback_cookie(response, "naver", callback_path)\n    await _remember_oauth_state("naver", oauth_state)\n    return response',
              )
              source = source.replace(
                  '    # 4. JWT  + ???\n    response = await _oauth_issue_token_and_redirect(user_id, email)\n    _clear_oauth_state_cookie(response, "naver")\n    await _clear_oauth_state_cache("naver", state)\n    return response',
                  '    # 4. JWT  + ???\n    callback_path = _resolve_oauth_callback(request, "naver", state)\n    response = await _oauth_issue_token_and_redirect(user_id, email, callback_path)\n    _clear_oauth_state_cookie(response, "naver")\n    _clear_oauth_callback_cookie(response, "naver")\n    _clear_frontend_login_callback_cookie(response)\n    await _clear_oauth_state_cache("naver", state)\n    return response',
              )
              source = source.replace(
                  'callback_path = _sanitize_callback_path(request.query_params.get("callbackUrl")) or _extract_oauth_callback_from_referer(request)',
                  'callback_path = _sanitize_callback_path(request.query_params.get("callbackUrl")) or _sanitize_callback_path(request.cookies.get("login_callback")) or _extract_oauth_callback_from_referer(request)',
              )

              path.write_text(source, encoding="utf-8")
              PY
              exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: MONGODB_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MONGODB_URL
            - name: REDIS_URL
              value: "redis://redis.tutum-data.svc.cluster.local:6379"
            - name: MARIADB_HOST
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MARIADB_HOST
            - name: MARIADB_PORT
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MARIADB_PORT
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MARIADB_USER
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MARIADB_PASSWORD
            - name: MARIADB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MARIADB_DATABASE
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: SECRET_KEY
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: GOOGLE_CLIENT_ID
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: GOOGLE_CLIENT_SECRET
                  optional: true
            - name: GOOGLE_REDIRECT_URI
              value: "https://tutum.my/api/v1/auth/google/callback"
            - name: KAKAO_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: KAKAO_CLIENT_ID
                  optional: true
            - name: KAKAO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: KAKAO_CLIENT_SECRET
                  optional: true
            - name: KAKAO_REDIRECT_URI
              value: "https://tutum.my/api/v1/auth/kakao/callback"
            - name: NAVER_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: NAVER_CLIENT_ID
                  optional: true
            - name: NAVER_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: NAVER_CLIENT_SECRET
                  optional: true
            - name: NAVER_REDIRECT_URI
              value: "https://tutum.my/api/v1/auth/naver/callback"
            - name: FRONTEND_URL
              value: "https://tutum.my"
            - name: CORS_ORIGINS
              value: '["https://tutum.my"]'
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: AWS_REGION
            - name: S3_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: S3_BUCKET_NAME
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: AWS_SECRET_ACCESS_KEY
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
