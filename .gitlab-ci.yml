# ============================================
# Tutum CI/CD Pipeline (Template)
# ============================================
#
# 사전 요구사항:
#   - GitLab Runner 등록
#   - Harbor 레지스트리: HARBOR_URL, HARBOR_USER, HARBOR_PASSWORD
#   - SonarQube: SONAR_HOST_URL, SONAR_TOKEN
#   - Cosign: COSIGN_KEY (이미지 서명용)
#   - ArgoCD: ARGOCD_SERVER, ARGOCD_AUTH_TOKEN
# ============================================

variables:
  HARBOR_REGISTRY: "192.168.56.12:8080"
  HARBOR_PROJECT: "tutum"
  FRONTEND_IMAGE: "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/frontend"
  BACKEND_IMAGE: "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/backend"
  WORKERS_IMAGE: "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/workers"

stages:
  - lint
  - test
  - scan
  - build
  - security
  - sign
  - deploy

# ============================================
# Stage 1: Lint
# ============================================

lint:frontend:
  stage: lint
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm run lint
  only:
    changes:
      - frontend/**/*

lint:backend:
  stage: lint
  image: python:3.11-slim
  script:
    - cd backend
    - pip install flake8
    - flake8 app/ --max-line-length=120
  only:
    changes:
      - backend/**/*

# ============================================
# Stage 2: Test
# ============================================

test:frontend:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm run build
  only:
    changes:
      - frontend/**/*

test:backend:
  stage: test
  image: python:3.11-slim
  script:
    - cd backend
    - pip install -r requirements.txt
    - pip install pytest
    - pytest tests/ -v || true
  only:
    changes:
      - backend/**/*

# ============================================
# Stage 3: SonarQube Scan
# ============================================

sonar:frontend:
  stage: scan
  image: sonarsource/sonar-scanner-cli:latest
  script:
    - sonar-scanner -Dproject.settings=frontend/sonar-project.properties
  allow_failure: true
  only:
    changes:
      - frontend/**/*

sonar:backend:
  stage: scan
  image: sonarsource/sonar-scanner-cli:latest
  script:
    - sonar-scanner -Dproject.settings=backend/sonar-project.properties
  allow_failure: true
  only:
    changes:
      - backend/**/*

# ============================================
# Stage 4: Docker Build & Push to Harbor
# ============================================

build:frontend:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  script:
    - docker login -u ${HARBOR_USER} -p ${HARBOR_PASSWORD} ${HARBOR_REGISTRY}
    - docker build -t ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA} -t ${FRONTEND_IMAGE}:latest ./frontend
    - docker push ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${FRONTEND_IMAGE}:latest
  only:
    changes:
      - frontend/**/*

build:backend:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  script:
    - docker login -u ${HARBOR_USER} -p ${HARBOR_PASSWORD} ${HARBOR_REGISTRY}
    - docker build -t ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA} -t ${BACKEND_IMAGE}:latest ./backend
    - docker push ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${BACKEND_IMAGE}:latest
  only:
    changes:
      - backend/**/*

build:workers:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  script:
    - docker login -u ${HARBOR_USER} -p ${HARBOR_PASSWORD} ${HARBOR_REGISTRY}
    - docker build -t ${WORKERS_IMAGE}:${CI_COMMIT_SHORT_SHA} -t ${WORKERS_IMAGE}:latest ./backend/workers
    - docker push ${WORKERS_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${WORKERS_IMAGE}:latest
  only:
    changes:
      - backend/workers/**/*

# ============================================
# Stage 5: Trivy 이미지 취약점 스캔
# ============================================

security:frontend:
  stage: security
  image: aquasec/trivy:latest
  script:
    - trivy image --severity HIGH,CRITICAL --exit-code 0 ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
  allow_failure: true
  needs:
    - build:frontend

security:backend:
  stage: security
  image: aquasec/trivy:latest
  script:
    - trivy image --severity HIGH,CRITICAL --exit-code 0 ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
  allow_failure: true
  needs:
    - build:backend

# ============================================
# Stage 6: Cosign 이미지 서명
# ============================================

sign:frontend:
  stage: sign
  image: bitnami/cosign:latest
  script:
    - cosign sign --key env://COSIGN_KEY ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
  allow_failure: true
  needs:
    - security:frontend

sign:backend:
  stage: sign
  image: bitnami/cosign:latest
  script:
    - cosign sign --key env://COSIGN_KEY ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
  allow_failure: true
  needs:
    - security:backend

# ============================================
# Stage 7: ArgoCD 배포 트리거
# ============================================

deploy:staging:
  stage: deploy
  image: argoproj/argocd:latest
  script:
    - argocd login ${ARGOCD_SERVER} --auth-token ${ARGOCD_AUTH_TOKEN} --insecure
    - argocd app sync tutum-staging
  environment:
    name: staging
  only:
    - develop

deploy:production:
  stage: deploy
  image: argoproj/argocd:latest
  script:
    - argocd login ${ARGOCD_SERVER} --auth-token ${ARGOCD_AUTH_TOKEN} --insecure
    - argocd app sync tutum-production
  environment:
    name: production
  when: manual
  only:
    - main
