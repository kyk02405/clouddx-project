stages:
  - guard
  - lint
  - test
  - scan
  - build
  - security
  - sign
  - deploy
  - notify
  - mirror

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "api"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

default:
  tags: [k8s]

variables:
  BACKEND_IMAGE: "${ECR_REGISTRY}/tutum/backend"
  WORKERS_IMAGE: "${ECR_REGISTRY}/tutum/workers"
  # 매니페스트는 동일 레포(tutum-backend)의 overlays/에 위치 → ArgoCD가 같은 레포 감시
  K8S_MANIFESTS_REPO: "https://gitlab.com/tutum-project/tutum-app/tutum-backend.git"
  STAGING_MANIFEST: "k8s-manifests/overlays/staging/kustomization.yaml"
  PRODUCTION_MANIFEST: "k8s-manifests/overlays/production/kustomization.yaml"
  GITHUB_MONOREPO_REPO: "https://github.com/kyk02405/clouddx-project.git"

# GitLab commit policy guard (ignored files such as env examples are allowed)
guard:commit-policy:
  stage: guard
  image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/alpine:3.20
  allow_failure: true
  before_script:
    - apk add --no-cache git
  script:
    - |
      ZERO_SHA="0000000000000000000000000000000000000000"
      BEFORE="${CI_COMMIT_BEFORE_SHA:-$ZERO_SHA}"
      if [ "$BEFORE" != "$ZERO_SHA" ] && git rev-parse "$BEFORE" >/dev/null 2>&1; then
        git diff --name-only "$BEFORE" "${CI_COMMIT_SHA}" > /tmp/changed_files.txt
      else
        git ls-tree -r --name-only "${CI_COMMIT_SHA}" > /tmp/changed_files.txt
      fi

      bad=0
      while IFS= read -r f; do
        [ -z "$f" ] && continue
        case "$f" in
          .env.example|.env|backend/.env) echo "INFO: skip known env file: $f"; continue ;;
        esac
        if git check-ignore -q -- "$f"; then
          echo "WARNING: gitignore-matched file detected: $f"
          bad=1
        fi
      done < /tmp/changed_files.txt

      [ "$bad" -ne 0 ] && exit 1 || true

lint:backend:
  stage: lint
  image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/python:3.11-slim
  script:
    - pip install flake8
    - flake8 backend/app --max-line-length=120
    - flake8 backend/workers --max-line-length=120
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"'
      changes:
        - backend/**/*

lint:shell-scripts:
  stage: lint
  image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/alpine:3.20
  before_script:
    - apk add --no-cache bash
  script:
    - |
      set -e
      find scripts -type f -name '*.sh' -print0 | while IFS= read -r -d '' file; do
        echo "Checking ${file}"
        bash -n "${file}"
      done
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"'
      changes:
        - scripts/**/*
        - .gitlab-ci.yml

test:backend:
  stage: test
  image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/python:3.11-slim
  script:
    - |
      set -e
      cd backend
      if [ -f requirements.txt ]; then
        pip install -r requirements.txt
      fi
      pip install pytest

      run_pytest_if_exists() {
        target="$1"
        if [ -d "$target" ] && find "$target" -type f \( -name 'test_*.py' -o -name '*_test.py' \) | grep -q .; then
          pytest "$target" -q
        else
          echo "INFO: no test files in $target, skip"
        fi
      }

      run_pytest_if_exists app/ocr-api/tests
      run_pytest_if_exists workers/tests
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"'
      changes:
        - backend/**/*

test:kustomize:
  stage: test
  image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/amazon/aws-cli:2.15.0
  script:
    - |
      set -e
      KUBECTL_VERSION="v1.31.6"
      curl -fsSL -o /usr/local/bin/kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
      chmod +x /usr/local/bin/kubectl

      kubectl kustomize k8s-manifests/apps/argocd >/dev/null
      kubectl kustomize k8s-manifests/overlays/staging >/dev/null
      kubectl kustomize k8s-manifests/overlays/production >/dev/null
      kubectl create --dry-run=client -f k8s-manifests/argocd/argocd-config-app.yaml >/dev/null
      kubectl create --dry-run=client -f k8s-manifests/argocd/staging-app.yaml >/dev/null
      kubectl create --dry-run=client -f k8s-manifests/argocd/production-app.yaml >/dev/null
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"'
      changes:
        - k8s-manifests/**/*
        - .gitlab-ci.yml

aws:precheck:
  stage: test
  image: amazon/aws-cli:2.15.44
  tags: [k8s]
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: manual
    - when: never
  script:
    - |
      set -e
      test -n "${AWS_ACCESS_KEY_ID:-}" || { echo "ERROR: AWS_ACCESS_KEY_ID is missing"; exit 1; }
      test -n "${AWS_SECRET_ACCESS_KEY:-}" || { echo "ERROR: AWS_SECRET_ACCESS_KEY is missing"; exit 1; }
      test -n "${AWS_DEFAULT_REGION:-}" || { echo "ERROR: AWS_DEFAULT_REGION is missing"; exit 1; }
      test -n "${AWS_ACCOUNT_ID:-}" || { echo "ERROR: AWS_ACCOUNT_ID is missing"; exit 1; }
      aws --version
      aws sts get-caller-identity --region "${AWS_DEFAULT_REGION}"
      aws ecr describe-repositories --region "${AWS_DEFAULT_REGION}" --query "repositories[].repositoryName" || true

aws:ecr-bootstrap:
  stage: test
  image: amazon/aws-cli:2.15.44
  tags: [k8s]
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: manual
    - when: never
  script: |
    set -e
    test -n "${AWS_DEFAULT_REGION:-}" || { echo "ERROR: AWS_DEFAULT_REGION is missing"; exit 1; }
    for repo in tutum/backend tutum/workers; do
      aws ecr describe-repositories \
        --region "${AWS_DEFAULT_REGION}" \
        --repository-names "$repo" >/dev/null 2>&1 || \
      aws ecr create-repository \
        --region "${AWS_DEFAULT_REGION}" \
        --repository-name "$repo"
    done
    aws ecr describe-repositories --region "${AWS_DEFAULT_REGION}" --query "repositories[].repositoryName"
    aws ecr get-login-password --region "${AWS_DEFAULT_REGION}" >/dev/null

aws:ecr-push-check:
  stage: test
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
      command: ["--tls=false"]
  tags: [k8s]
  when: manual
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: manual
    - when: never
  script:
    - apk add --no-cache aws-cli
    - |
      i=0
      until docker info >/dev/null 2>&1; do
        i=$((i+1))
        if [ "$i" -ge 30 ]; then
          echo "ERROR: Docker daemon not ready after 60s"
          exit 1
        fi
        sleep 2
      done

      set -e
      test -n "${AWS_ACCESS_KEY_ID:-}" || { echo "ERROR: AWS_ACCESS_KEY_ID is missing"; exit 1; }
      test -n "${AWS_SECRET_ACCESS_KEY:-}" || { echo "ERROR: AWS_SECRET_ACCESS_KEY is missing"; exit 1; }
      test -n "${AWS_DEFAULT_REGION:-}" || { echo "ERROR: AWS_DEFAULT_REGION is missing"; exit 1; }
      test -n "${AWS_ACCOUNT_ID:-}" || { echo "ERROR: AWS_ACCOUNT_ID is missing"; exit 1; }

      ECR_REGISTRY_EFFECTIVE="${ECR_REGISTRY:-${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com}"
      ECR_REPO_EFFECTIVE="${ECR_REPOSITORY_BACKEND:-tutum/backend}"
      TEST_TAG="ci-smoke-${CI_PIPELINE_ID}-${CI_JOB_ID}"

      echo "Using registry: ${ECR_REGISTRY_EFFECTIVE}"
      echo "Using repo: ${ECR_REPO_EFFECTIVE}"
      echo "Using tag: ${TEST_TAG}"

      aws ecr get-login-password --region "${AWS_DEFAULT_REGION}" | \
        docker login --username AWS --password-stdin "${ECR_REGISTRY_EFFECTIVE}"

      aws ecr describe-repositories \
        --region "${AWS_DEFAULT_REGION}" \
        --repository-names "${ECR_REPO_EFFECTIVE}" >/dev/null 2>&1 || \
      aws ecr create-repository \
        --region "${AWS_DEFAULT_REGION}" \
        --repository-name "${ECR_REPO_EFFECTIVE}" >/dev/null

      docker pull alpine:3.20
      docker tag alpine:3.20 "${ECR_REGISTRY_EFFECTIVE}/${ECR_REPO_EFFECTIVE}:${TEST_TAG}"
      docker push "${ECR_REGISTRY_EFFECTIVE}/${ECR_REPO_EFFECTIVE}:${TEST_TAG}"
      aws ecr describe-images \
        --region "${AWS_DEFAULT_REGION}" \
        --repository-name "${ECR_REPO_EFFECTIVE}" \
        --image-ids imageTag="${TEST_TAG}" \
        --query "imageDetails[0].imageTags"
      aws ecr batch-delete-image \
        --region "${AWS_DEFAULT_REGION}" \
        --repository-name "${ECR_REPO_EFFECTIVE}" \
        --image-ids imageTag="${TEST_TAG}" >/dev/null || true

aws:eks-cluster-check:
  stage: test
  image: amazon/aws-cli:2.15.44
  tags: [k8s]
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: manual
    - when: never
  script: |
    set -e
    test -n "${AWS_ACCESS_KEY_ID:-}" || { echo "ERROR: AWS_ACCESS_KEY_ID is missing"; exit 1; }
    test -n "${AWS_SECRET_ACCESS_KEY:-}" || { echo "ERROR: AWS_SECRET_ACCESS_KEY is missing"; exit 1; }
    test -n "${AWS_DEFAULT_REGION:-}" || { echo "ERROR: AWS_DEFAULT_REGION is missing"; exit 1; }
    test -n "${AWS_ACCOUNT_ID:-}" || { echo "ERROR: AWS_ACCOUNT_ID is missing"; exit 1; }
    test -n "${EKS_CLUSTER_NAME_STG:-}" || { echo "ERROR: EKS_CLUSTER_NAME_STG is missing"; exit 1; }

    echo "Checking AWS identity..."
    aws sts get-caller-identity --region "${AWS_DEFAULT_REGION}"
    echo "Checking EKS cluster: ${EKS_CLUSTER_NAME_STG}"
    aws eks describe-cluster \
      --region "${AWS_DEFAULT_REGION}" \
      --name "${EKS_CLUSTER_NAME_STG}" \
      --query "cluster.{name:name,status:status,version:version,platformVersion:platformVersion,endpoint:endpoint}"
    NG_LIST="$(aws eks list-nodegroups --region "${AWS_DEFAULT_REGION}" --cluster-name "${EKS_CLUSTER_NAME_STG}" --query 'nodegroups' --output text)"
    if [ -z "${NG_LIST}" ] || [ "${NG_LIST}" = "None" ]; then
      echo "WARNING: no nodegroups found for ${EKS_CLUSTER_NAME_STG}"
    else
      for ng in ${NG_LIST}; do
        aws eks describe-nodegroup \
          --region "${AWS_DEFAULT_REGION}" \
          --cluster-name "${EKS_CLUSTER_NAME_STG}" \
          --nodegroup-name "${ng}" \
          --query "nodegroup.{name:nodegroupName,status:status,desired:scalingConfig.desiredSize,min:scalingConfig.minSize,max:scalingConfig.maxSize}"
      done
    fi

aws:eks-kubectl-smoke:
  stage: test
  image: amazon/aws-cli:2.15.44
  tags: [k8s]
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: manual
    - when: never
  script: |
    set -e
    test -n "${AWS_ACCESS_KEY_ID:-}" || { echo "ERROR: AWS_ACCESS_KEY_ID is missing"; exit 1; }
    test -n "${AWS_SECRET_ACCESS_KEY:-}" || { echo "ERROR: AWS_SECRET_ACCESS_KEY is missing"; exit 1; }
    test -n "${AWS_DEFAULT_REGION:-}" || { echo "ERROR: AWS_DEFAULT_REGION is missing"; exit 1; }
    test -n "${EKS_CLUSTER_NAME_STG:-}" || { echo "ERROR: EKS_CLUSTER_NAME_STG is missing"; exit 1; }

    echo "Installing kubectl..."
    KUBECTL_VERSION="$(curl -L -s https://dl.k8s.io/release/stable.txt)"
    curl -L -o kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
    chmod +x kubectl
    mv kubectl /usr/local/bin/kubectl

    aws eks update-kubeconfig \
      --region "${AWS_DEFAULT_REGION}" \
      --name "${EKS_CLUSTER_NAME_STG}"

    kubectl get nodes -o wide
    kubectl get ns

sonar:backend:
  stage: scan
  tags: [k8s]
  image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/sonarsource/sonar-scanner-cli:latest
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  script:
    - |
      sonar-scanner \
        -Dsonar.projectKey=tutum-backend \
        -Dsonar.projectName="Tutum Backend" \
        -Dsonar.sources=backend/app,backend/workers \
        -Dsonar.exclusions=**/__pycache__/**,**/tests/**,.venv/** \
        -Dsonar.host.url=${SONAR_HOST_URL} \
        -Dsonar.token=${SONAR_TOKEN}
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"'
      changes:
        - backend/**/*

.build_retry_registry: &build_retry_registry
  retry:
    max: 2
    when:
      - script_failure
      - runner_system_failure
      - api_failure
      - stuck_or_timeout_failure

build:backend:
  <<: *build_retry_registry
  stage: build
  image:
    name: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  variables:
    KUBERNETES_EPHEMERAL_STORAGE_REQUEST: "8Gi"
    KUBERNETES_EPHEMERAL_STORAGE_LIMIT: "10Gi"
  before_script:
    - mkdir -p /kaniko/.docker
    - printf '{"credHelpers":{"%s":"ecr-login"}}' "${ECR_REGISTRY}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/backend"
      --dockerfile "${CI_PROJECT_DIR}/backend/Dockerfile"
      --destination "${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --destination "${BACKEND_IMAGE}:latest"
      --compressed-caching=false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"'
      changes:
        - backend/**/*

build:workers:
  <<: *build_retry_registry
  stage: build
  image:
    name: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  variables:
    KUBERNETES_EPHEMERAL_STORAGE_REQUEST: "4Gi"
    KUBERNETES_EPHEMERAL_STORAGE_LIMIT: "6Gi"
  before_script:
    - mkdir -p /kaniko/.docker
    - printf '{"credHelpers":{"%s":"ecr-login"}}' "${ECR_REGISTRY}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/backend/workers"
      --dockerfile "${CI_PROJECT_DIR}/backend/workers/Dockerfile"
      --destination "${WORKERS_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --destination "${WORKERS_IMAGE}:latest"
      --compressed-caching=false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"'
      changes:
        - backend/**/*

security:backend:
  stage: security
  tags: [k8s]
  image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/aquasec/trivy:latest
  variables:
    TRIVY_DB_REPOSITORY: "ghcr.io/aquasecurity/trivy-db:2"
  before_script:
    - apk add --no-cache aws-cli
    - export TRIVY_USERNAME=AWS
    - export TRIVY_PASSWORD=$(aws ecr get-login-password --region ${AWS_DEFAULT_REGION})
    - export TRIVY_AUTH_URL=${ECR_REGISTRY}
  script:
    - trivy image --severity HIGH,CRITICAL --exit-code 0 --timeout 10m ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
  allow_failure: true
  needs:
    - job: build:backend
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"'
      changes:
        - backend/**/*

security:workers:
  stage: security
  tags: [k8s]
  image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/aquasec/trivy:latest
  variables:
    TRIVY_DB_REPOSITORY: "ghcr.io/aquasecurity/trivy-db:2"
  before_script:
    - apk add --no-cache aws-cli
    - export TRIVY_USERNAME=AWS
    - export TRIVY_PASSWORD=$(aws ecr get-login-password --region ${AWS_DEFAULT_REGION})
    - export TRIVY_AUTH_URL=${ECR_REGISTRY}
  script:
    - trivy image --severity HIGH,CRITICAL --exit-code 0 --timeout 10m ${WORKERS_IMAGE}:${CI_COMMIT_SHORT_SHA}
  allow_failure: true
  needs:
    - job: build:workers
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"'
      changes:
        - backend/**/*

sign:backend:
  stage: sign
  tags: [k8s]
  image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/alpine:3.20
  variables:
    COSIGN_YES: "true"
  before_script:
    - apk add --no-cache aws-cli curl
    - curl -sLo /usr/local/bin/cosign https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
    - chmod +x /usr/local/bin/cosign
    - TOKEN=$(aws ecr get-login-password --region ${AWS_DEFAULT_REGION})
    - mkdir -p ~/.docker
    - printf '{"auths":{"%s":{"auth":"%s"}}}' "${ECR_REGISTRY}" "$(printf 'AWS:%s' "$TOKEN" | base64 -w 0)" > ~/.docker/config.json
  script:
    - cosign sign --key env://COSIGN_PRIVATE_KEY --registry-referrers-mode=legacy ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
  allow_failure: false
  needs:
    - job: build:backend
    - job: security:backend
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"'
      changes:
        - backend/**/*

sign:workers:
  stage: sign
  tags: [k8s]
  image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/alpine:3.20
  variables:
    COSIGN_YES: "true"
  before_script:
    - apk add --no-cache aws-cli curl
    - curl -sLo /usr/local/bin/cosign https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
    - chmod +x /usr/local/bin/cosign
    - TOKEN=$(aws ecr get-login-password --region ${AWS_DEFAULT_REGION})
    - mkdir -p ~/.docker
    - printf '{"auths":{"%s":{"auth":"%s"}}}' "${ECR_REGISTRY}" "$(printf 'AWS:%s' "$TOKEN" | base64 -w 0)" > ~/.docker/config.json
  script:
    - cosign sign --key env://COSIGN_PRIVATE_KEY --registry-referrers-mode=legacy ${WORKERS_IMAGE}:${CI_COMMIT_SHORT_SHA}
  allow_failure: false
  needs:
    - job: build:workers
    - job: security:workers
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"'
      changes:
        - backend/**/*

deploy:staging:
  stage: deploy
  image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/alpine:3.20
  before_script:
    - apk add --no-cache git
    - |
      K8S_MANIFESTS_TOKEN_TO_USE="${K8S_MANIFESTS_TOKEN:-${CI_JOB_TOKEN:-}}"
      if [ -z "$K8S_MANIFESTS_TOKEN_TO_USE" ]; then
        echo "Missing manifest repository token (K8S_MANIFESTS_TOKEN or CI_JOB_TOKEN)."
        exit 1
      fi
      export K8S_MANIFESTS_CLONE_URL="https://oauth2:${K8S_MANIFESTS_TOKEN_TO_USE}@${K8S_MANIFESTS_REPO#https://}"
  needs:
    - job: sign:backend
    - job: sign:workers
  script: |
    set -e
    git clone "${K8S_MANIFESTS_CLONE_URL%/}" /tmp/manifests
    cd /tmp/manifests
    git config user.email ci@tutum.dev
    git config user.name "GitLab CI"
    git checkout "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-develop}"

    touch /tmp/manifest_changed
    echo "0" > /tmp/manifest_changed
    kustomization_file="${STAGING_MANIFEST}"

    update_kustomization() {
      local image="$1"
      if grep -qF "  - name: ${image}" "${kustomization_file}"; then
        awk -v image="  - name: ${image}" -v tag="${CI_COMMIT_SHORT_SHA}" '
          $0 == image {
            print
            if (getline) {
              sub(/newTag: .*/, "newTag: " tag)
              print
              next
            }
          }
          { print }
        ' "${kustomization_file}" > "${kustomization_file}.tmp"
        mv "${kustomization_file}.tmp" "${kustomization_file}"
        echo "1" > /tmp/manifest_changed
        echo "Updated ${image}"
      else
        echo "WARN: ${image} not found in ${kustomization_file}"
      fi
    }

    update_kustomization "${BACKEND_IMAGE}"
    update_kustomization "${WORKERS_IMAGE}"

    if [ "$(cat /tmp/manifest_changed)" = "0" ]; then
      echo "No backend/worker image tags to update. Exit."
      exit 0
    fi

    git add "${kustomization_file}"
    git diff --cached --quiet || git commit -m "deploy(staging): backend+workers ${CI_COMMIT_SHORT_SHA} [skip ci]"
    git push origin "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-develop}"
  environment:
    name: staging
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      changes:
        - backend/**/*
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "api"'

deploy:production:
  stage: deploy
  image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/alpine:3.20
  before_script:
    - apk add --no-cache git
    - |
      K8S_MANIFESTS_TOKEN_TO_USE="${K8S_MANIFESTS_TOKEN:-${CI_JOB_TOKEN:-}}"
      if [ -z "$K8S_MANIFESTS_TOKEN_TO_USE" ]; then
        echo "Missing manifest repository token (K8S_MANIFESTS_TOKEN or CI_JOB_TOKEN)."
        exit 1
      fi
      export K8S_MANIFESTS_CLONE_URL="https://oauth2:${K8S_MANIFESTS_TOKEN_TO_USE}@${K8S_MANIFESTS_REPO#https://}"
  when: manual
  needs:
    - job: sign:backend
    - job: sign:workers
  script: |
    set -e
    git clone "${K8S_MANIFESTS_CLONE_URL%/}" /tmp/manifests
    cd /tmp/manifests
    git config user.email ci@tutum.dev
    git config user.name "GitLab CI"
    git checkout develop

    echo "0" > /tmp/manifest_changed
    kustomization_file="${PRODUCTION_MANIFEST}"

    update_kustomization() {
      local image="$1"
      if grep -qF "  - name: ${image}" "${kustomization_file}"; then
        awk -v image="  - name: ${image}" -v tag="${CI_COMMIT_SHORT_SHA}" '
          $0 == image {
            print
            if (getline) {
              sub(/newTag: .*/, "newTag: " tag)
              print
              next
            }
          }
          { print }
        ' "${kustomization_file}" > "${kustomization_file}.tmp"
        mv "${kustomization_file}.tmp" "${kustomization_file}"
        echo "1" > /tmp/manifest_changed
        echo "Updated ${image}"
      else
        echo "WARN: ${image} not found in ${kustomization_file}"
      fi
    }

    update_kustomization "${BACKEND_IMAGE}"
    update_kustomization "${WORKERS_IMAGE}"

    if [ "$(cat /tmp/manifest_changed)" = "0" ]; then
      echo "No backend/worker image tags to update. Exit."
      exit 0
    fi

    git add "${kustomization_file}"
    git diff --cached --quiet || git commit -m "deploy(prod): backend+workers ${CI_COMMIT_SHORT_SHA} [skip ci]"
    git push origin develop
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: manual
      changes:
        - backend/**/*

notify:slack_on_failure:
  stage: notify
  image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/curlimages/curl:8.7.1
  allow_failure: true
  script:
    - |
      curl -fsS -X POST -H "Content-type: application/json" \
      --data "{\"text\":\"[CI FAIL] ${CI_PROJECT_PATH} #${CI_PIPELINE_ID}\\n${CI_PIPELINE_URL}\"}" \
      "${SLACK_WEBHOOK_URL}"
  when: on_failure

notify:slack_on_success:
  stage: notify
  image: 903913341620.dkr.ecr.ap-northeast-2.amazonaws.com/curlimages/curl:8.7.1
  allow_failure: true
  script:
    - |
      curl -fsS -X POST -H "Content-type: application/json" \
      --data "{\"text\":\"[CI OK] ${CI_PROJECT_PATH} #${CI_PIPELINE_ID}\\n${CI_PIPELINE_URL}\"}" \
      "${SLACK_WEBHOOK_URL}"
  when: on_success

mirror:github-monorepo:
  stage: mirror
  image: alpine:3.20
  before_script:
    - apk add --no-cache git
    - chmod +x scripts/sync-to-github-monorepo.sh
  script:
    - |
      SYNC_SOURCE_PATH=. \
      SYNC_TARGET_PATH=backend \
      SYNC_COMPONENT_NAME=backend \
      SYNC_ROOT_OWNER=1 \
      GITHUB_MONOREPO_REPO="${GITHUB_MONOREPO_REPO}" \
      GITHUB_MONOREPO_TOKEN="${GITHUB_MONOREPO_TOKEN:-}" \
      scripts/sync-to-github-monorepo.sh
  rules:
    - if: '$GITHUB_MONOREPO_TOKEN && $CI_COMMIT_BRANCH == "develop" && ($CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api")'
    - if: '$GITHUB_MONOREPO_TOKEN && $CI_COMMIT_BRANCH == "main" && ($CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api")'
