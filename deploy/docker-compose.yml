version: '3.8'

services:

  nginx:
    image: nginx:alpine
    container_name: tutum-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
      - auth
    networks:
      - tutum-network
    restart: always

  mongodb:
    image: mongo:7.0
    container_name: tutum-mongodb
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=clouddx
    networks:
      - tutum-network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: tutum-redis
    volumes:
      - redis_data:/data
    networks:
      - tutum-network
    restart: always

  mariadb:
    image: mariadb:10.11
    container_name: tutum-mariadb
    volumes:
      - mariadb_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MARIADB_PASSWORD}
      - MYSQL_DATABASE=${MARIADB_DATABASE}
      - MYSQL_USER=${MARIADB_USER}
      - MYSQL_PASSWORD=${MARIADB_PASSWORD}
    networks:
      - tutum-network
    restart: always

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: tutum-backend
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/clouddx
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=
      - KAFKA_BOOTSTRAP_SERVERS=
    depends_on:
      - mongodb
      - redis
    networks:
      - tutum-network
    restart: always

  auth:
    build:
      context: ../auth
      dockerfile: Dockerfile
    container_name: tutum-auth
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/clouddx
      - REDIS_URL=redis://redis:6379
      - MARIADB_HOST=mariadb
      - MARIADB_PORT=3306
    depends_on:
      - mongodb
      - redis
      - mariadb
    networks:
      - tutum-network
    restart: always

  frontend:
    build:
      context: ../frontend/frontend
      dockerfile: Dockerfile
    container_name: tutum-frontend
    environment:
      - NEXT_PUBLIC_API_URL=https://kyungyoon.cloud/api/proxy
      - BACKEND_INTERNAL_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - tutum-network
    restart: always

networks:
  tutum-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  mariadb_data:
